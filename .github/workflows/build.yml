name: Build EFI Launcher
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-uefi
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
          targets: ${{ env.TARGET }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release
        run: |
          cargo build --release \
            -Z build-std=core,compiler_builtins,alloc \
            -Z build-std-features=compiler-builtins-mem \
            --target ${{ env.TARGET }}
      - name: Copy EFI to ESP
        run: |
          mkdir -p esp/EFI/BOOT
          cp target/${{ env.TARGET }}/release/efi-launcher.efi esp/EFI/BOOT/BOOTX64.EFI
      - uses: actions/upload-artifact@v4
        with:
          name: efi-launcher-${{ github.sha }}
          path: |
            esp/EFI/BOOT/BOOTX64.EFI
            esp/launcher.cfg
          retention-days: 30
