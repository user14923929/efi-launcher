# EFI Launcher — конфиг
# Кодировка: UTF-8
# Пути — Windows-style (обратный слеш), относительно корня ESP

timeout = 10    # секунд до автовыбора default-записи (0 = ждать вечно)
default = 0     # индекс записи для автозапуска

[[entry]]
title = "Memtest86+ — diagnostic RAM"
path  = "\\tools\\memtest86.efi"
icon  = "M"

[[entry]]
title = "GRUB → System"
path  = "\\tools\\grubx64.efi"
icon  = "L"

[[entry]]
title = "Windows Boot Manager"
path  = "\\tools\\bootmgfw.efi"
icon  = "W"

[[entry]]
title = "UEFI Shell"
path  = "\\tools\\shellx64.efi"
icon  = "$"

[[entry]]
title = "System Rescue CD"
path  = "\\tools\\sysresccd.efi"
icon  = "R"
